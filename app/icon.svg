<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- A snowflake/plunge mark: ice-blue on deep blue-black. Reads at 16px. -->
  <rect width="32" height="32" rx="7" fill="#070d13" />
  <g stroke="#6fd3e8" stroke-width="2" stroke-linecap="round">
    <line x1="16" y1="6" x2="16" y2="26" />
    <line x1="7.3" y1="11" x2="24.7" y2="21" />
    <line x1="7.3" y1="21" x2="24.7" y2="11" />
  </g>
  <g stroke="#a7e7f5" stroke-width="1.6" stroke-linecap="round">
    <!-- small barbs on the vertical -->
    <line x1="16" y1="10" x2="13" y2="8" />
    <line x1="16" y1="10" x2="19" y2="8" />
    <line x1="16" y1="22" x2="13" y2="24" />
    <line x1="16" y1="22" x2="19" y2="24" />
  </g>
</svg>
